<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Market | Sports Collectibles Demo</title>
    <style>
        :root {
            --primary-color: #ff9900; 
            --secondary-color: #232f3e; 
            --light-bg: #f3f3f3; 
            --text-color: #111111;
            --card-shadow: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
        }
        body { 
            font-family: Arial, sans-serif; 
            line-height: 1.4; 
            margin: 0; 
            padding: 0; 
            background-color: var(--light-bg); 
            color: var(--text-color); 
        }
        header { 
            background-color: var(--secondary-color); 
            color: white; 
            padding: 10px 0; 
            text-align: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); 
        }
        header h1 { margin: 0; font-size: 2.5em; color: var(--primary-color); }
        .container { 
            max-width: 1400px; 
            margin: 20px auto; 
            padding: 0 10px; 
            display: flex; 
            gap: 20px;
        }

        /* Layout Structure */
        #main-content { flex-grow: 3; min-width: 70%; }
        #sidebar-cart { 
            flex-grow: 1; 
            min-width: 300px; 
            max-width: 350px; 
            background: white; 
            padding: 20px; 
            border-radius: 4px; 
            box-shadow: var(--card-shadow); 
            position: sticky; 
            top: 20px; 
            align-self: flex-start;
        }
        
        /* Product Grid */
        #products { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .product-card { 
            background: white; 
            padding: 15px; 
            border-radius: 4px; 
            box-shadow: var(--card-shadow); 
            transition: box-shadow 0.3s;
            display: flex; flex-direction: column; 
            height: 100%;
        }
        .product-card:hover { box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        
        .product-card img { 
            max-width: 100%; 
            height: 200px; 
            object-fit: contain; 
            margin-bottom: 10px;
            background-color: #eee; 
            border: 1px dashed #ccc;
            display: block; 
            text-align: center; 
            line-height: 200px; 
            color: #666;
            font-size: 0.9em;
        }
        .product-card h3 { font-size: 1.1em; color: #007185; margin: 5px 0; flex-grow: 1;}
        .price { font-weight: bold; color: #B12704; font-size: 1.3em; margin: 10px 0; }
        .rating { color: var(--primary-color); font-size: 0.9em; margin-bottom: 5px; }
        .stock { font-size: 0.9em; margin-bottom: 10px; font-weight: bold; }
        
        /* Buttons */
        button { 
            background-color: #ffd814; 
            color: var(--text-color); 
            padding: 8px 15px; 
            border: 1px solid #fcd200; 
            border-radius: 3px; 
            cursor: pointer; 
            font-size: 1em; 
            transition: opacity 0.3s; 
            width: 100%;
            margin-top: 10px;
        }
        button:hover { opacity: 0.9; }

        /* Cart/Checkout */
        .cart-item-list { list-style: none; padding: 0; margin: 10px 0; font-size: 0.9em; }
        .cart-item-list li { margin-bottom: 5px; display: flex; justify-content: space-between; }
        .total-line { display: flex; justify-content: space-between; font-size: 1.1em; padding-top: 10px; border-top: 1px dashed #ccc; }
        .grand-total { font-weight: bold; font-size: 1.6em; color: #B12704; margin-top: 10px; }

        .checkout-btn {
            background-color: #4CAF50; 
            color: white;
            border: 1px solid #388E3C;
            margin-top: 15px;
        }
        .checkout-btn:hover { background-color: #388E3C; }
    </style>
</head>
<body>

    <header>
        <h1><span style="color: white; font-weight: normal;">THE</span> BLACK MARKET</h1>
    </header>

    <div class="container">
        
        <div id="main-content">
            <h2>NBA & Collectibles</h2>
            <main id="products">
                
                <div class="product-card" data-price="380.00" data-name="Nike Kobe 6 Protro (Grinch)" data-id="K6G">
                    <img src="https://via.placeholder.com/200x200?text=Kobe+Grinch" alt="Kobe 6">
                    <h3>Nike Kobe 6 Protro (Grinch Colorway)</h3>
                    <p class="rating">⭐⭐⭐⭐⭐ (2,450)</p>
                    <p class="price">$380.00</p>
                    <button onclick="addToCart(this)">Add to Cart</button>
                </div>

                <div class="product-card" data-price="185.00" data-name="Official NBA Game Ball" data-id="NBAGB">
                    <img src="https://via.placeholder.com/200x200?text=Wilson+Ball" alt="NBA Ball">
                    <h3>Official NBA Game Ball (Wilson)</h3>
                    <p class="rating">⭐⭐⭐⭐ (1,120)</p>
                    <p class="price">$185.00</p>
                    <button onclick="addToCart(this)">Add to Cart</button>
                </div>
                
                <div class="product-card" data-price="299.99" data-name="MJ #23 Authentic Jersey" data-id="J23A">
                    <img src="https://via.placeholder.com/200x200?text=Jordan+Jersey" alt="Jordan Jersey">
                    <h3>Michael Jordan #23 Authentic Jersey (Bulls)</h3>
                    <p class="rating">⭐⭐⭐⭐⭐ (450)</p>
                    <p class="price">$299.99</p>
                    <button onclick="addToCart(this)">Add to Cart</button>
                </div>

            </main>
        </div>

        <section id="sidebar-cart">
            <h2>Your Cart (<span id="cart-count-sidebar">0</span>)</h2>
            
            <div id="cart-summary-display">
                <ul class="cart-item-list" id="cart-item-list">
                    <li>Your cart is empty.</li>
                </ul>
                <div class="total-line"><span>Subtotal:</span> <span id="subtotal-display">$0.00</span></div>
                <div class="grand-total total-line"><span>Total:</span> <span id="total-price-display">$5.00</span></div>
            </div>

            <div style="margin-top: 20px;">
                <label for="checkout-email" style="font-size: 0.9em;">Email Receipt to:</label>
                <input type="email" id="checkout-email" placeholder="Enter your email" required style="width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box;">
                <button type="button" class="checkout-btn" onclick="processCheckout()">Complete Purchase & Send Email</button>
            </div>

            <form id="hidden-email-form" method="POST" style="display:none;">
                <input type="hidden" name="_subject" value="Order Receipt - The Black Market">
                <input type="hidden" name="Order_Summary" id="form-order-summary">
                <input type="hidden" name="Total_Amount" id="form-total">
                <input type="hidden" name="_template" value="table">
            </form>
        </section>
    </div>

    <script>
        const cart = [];
        const SHIPPING_FEE = 5.00;
        
        function updateCartDisplay() {
            const listElement = document.getElementById('cart-item-list');
            const subtotalElement = document.getElementById('subtotal-display');
            const totalElement = document.getElementById('total-price-display');
            const cartCountSidebar = document.getElementById('cart-count-sidebar');

            let subtotal = 0;
            const itemMap = {};

            cart.forEach(item => {
                if (itemMap[item.id]) { itemMap[item.id].qty++; }
                else { itemMap[item.id] = { ...item, qty: 1 }; }
                subtotal += item.price;
            });

            let itemsHtml = cart.length === 0 ? `<li>Your cart is empty.</li>` : "";
            for (const id in itemMap) {
                const item = itemMap[id];
                itemsHtml += `<li><span>${item.name} (x${item.qty})</span> <span>$${(item.price * item.qty).toFixed(2)}</span></li>`;
            }

            listElement.innerHTML = itemsHtml;
            subtotalElement.textContent = `$${subtotal.toFixed(2)}`;
            totalElement.textContent = `$${(subtotal + SHIPPING_FEE).toFixed(2)}`;
            cartCountSidebar.textContent = cart.length;
        }

        function addToCart(button) {
            const card = button.closest('.product-card');
            cart.push({ 
                id: card.dataset.id, 
                name: card.dataset.name, 
                price: parseFloat(card.dataset.price) 
            });
            updateCartDisplay();
            button.textContent = 'Added!';
            setTimeout(() => { button.textContent = 'Add to Cart'; }, 800);
        }

        function processCheckout() {
            const email = document.getElementById('checkout-email').value;
            const total = document.getElementById('total-price-display').textContent;
            
            if (cart.length === 0) return alert("Cart is empty!");
            if (!email.includes('@')) return alert("Please enter a valid email!");

            // 1. Format the cart items for the email
            let summaryText = cart.map(item => `${item.name} ($${item.price})`).join(", ");

            // 2. Prepare the hidden form
            const form = document.getElementById('hidden-email-form');
            document.getElementById('form-order-summary').value = summaryText;
            document.getElementById('form-total').value = total;
            
            // 3. Set the form action to the user's email so THEY receive it
            form.action = `https://formsubmit.co/${email}`;

            alert("Processing... You will be redirected to confirm your receipt.");
            
            // 4. Send it!
            form.submit();
        }

        updateCartDisplay();
    </script>
</body>
</html>

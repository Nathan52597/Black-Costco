<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Market | Sports Collectibles</title>
    <style>
        /* FIXED: Removed the space between ":" and "root" */
        :root {
            --primary: #ff9900;
            --primary-hover: #e68a00;
            --secondary: #232f3e;
            --bg-light: #f8f9fa;
            --text-dark: #1a1a1a;
            --accent-red: #B12704;
            --border-color: #ddd;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            background-color: var(--bg-light); 
            color: var(--text-dark);
        }

        header { 
            background: var(--secondary); 
            color: white; 
            padding: 1.5rem; 
            text-align: center; 
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 { margin: 0; letter-spacing: 1px; font-weight: 300; }
        header b { color: var(--primary); font-weight: 800; }

        .container { 
            max-width: 1200px; 
            margin: 2rem auto; 
            padding: 0 20px; 
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            #sidebar-cart { position: static; }
        }

        #products { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px; 
        }

        .product-card { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: var(--shadow);
            display: flex; 
            flex-direction: column;
            transition: transform 0.2s;
        }

        .product-card:hover { transform: translateY(-5px); }

        .product-card img { 
            width: 100%; 
            height: 200px; 
            object-fit: contain; 
            margin-bottom: 15px;
        }

        .product-card h3 { font-size: 1rem; margin: 0 0 10px 0; height: 3rem; overflow: hidden; }
        .price { font-size: 1.4rem; font-weight: bold; color: var(--accent-red); margin: 5px 0; }
        .rating { color: var(--primary); font-size: 0.85rem; }

        button { 
            cursor: pointer; 
            border: none; 
            border-radius: 4px; 
            font-weight: 600; 
            transition: 0.2s;
        }

        .btn-add { 
            background: var(--primary); 
            padding: 10px; 
            width: 100%; 
            margin-top: auto;
        }
        .btn-add:hover { background: var(--primary-hover); }

        #sidebar-cart { 
            background: white; 
            padding: 25px; 
            border-radius: 8px; 
            box-shadow: var(--shadow);
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
        }

        .btn-remove {
            background: none;
            color: #999;
            font-size: 0.7rem;
            text-decoration: underline;
        }
        .btn-remove:hover { color: var(--accent-red); }

        .summary-row { display: flex; justify-content: space-between; margin: 10px 0; }
        .total-row { 
            border-top: 2px solid #eee; 
            padding-top: 15px; 
            font-weight: bold; 
            font-size: 1.2rem; 
            color: var(--accent-red);
        }

        .checkout-input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        .btn-checkout {
            width: 100%;
            padding: 15px;
            background: #2ecc71;
            color: white;
            font-size: 1rem;
        }
        .btn-checkout:hover { background: #27ae60; }
        .btn-checkout:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <header>
        <h1>THE <b>BLACK MARKET</b></h1>
    </header>

    <div class="container">
        <main>
            <h2 style="margin-top: 0;">NBA & Collectibles</h2>
            <div id="products"></div>
        </main>

        <aside id="sidebar-cart">
            <h2 style="margin-top:0">Your Cart (<span id="count">0</span>)</h2>
            <div id="cart-items"></div>
            
            <div class="summary-row" style="margin-top: 20px;">
                <span>Subtotal</span>
                <span id="subtotal">$0.00</span>
            </div>
            <div class="summary-row">
                <span>Shipping</span>
                <span id="shipping">$5.00</span>
            </div>
            <div class="summary-row total-row">
                <span>Total</span>
                <span id="total">$5.00</span>
            </div>

            <input type="email" id="email" class="checkout-input" placeholder="Email for receipt" required>
            <button class="btn-checkout" onclick="checkout()" id="checkout-btn">Complete Purchase</button>
            
            <form id="hidden-form" method="POST" style="display:none;"></form>
        </aside>
    </div>

    <script>
        const PRODUCTS = [
            { id: 'K6G', name: 'Nike Kobe 6 Protro (Grinch)', price: 380.00, rating: 5, reviews: 2450, img: 'https://ofour.com/wp-content/uploads/2020/12/img19.jpg' },
            { id: 'NBAGB', name: 'Official NBA Game Ball (Wilson)', price: 185.00, rating: 4, reviews: 1120, img: 'https://i5.walmartimages.com/seo/Wilson-NBA-DRV-Pro-Basketball_c86a96cc-cd0f-4899-9237-feff2bca7c03.38448f8503a51b8b3e84a1c589cf9d7f.jpeg' },
            { id: 'J23A', name: 'Michael Jordan #23 Authentic Jersey', price: 299.99, rating: 5, reviews: 450, img: 'https://shop.bulls.com/cdn/shop/files/BULLMZ2310D.jpg?v=1695843677&width=1206' }, // FIXED: Added missing comma
            { id: 'KBAV', name: 'Kobe Bryant Avatar (Roblox)', price: 45.00, rating: 5, reviews: 890, img: 'https://tr.rbxcdn.com/180DAY-29610bca5d144bc6bac8e185d0fda03a/420/420/Hat/Webp/noFilter' }
        ];

        let cart = [];
        const SHIPPING = 5.00;

        function initStore() {
            const productGrid = document.getElementById('products');
            productGrid.innerHTML = PRODUCTS.map(p => `
                <div class="product-card">
                    <img src="${p.img}" alt="${p.name}">
                    <div class="rating">${'⭐'.repeat(p.rating)} (${p.reviews})</div>
                    <h3>${p.name}</h3>
                    <p class="price">$${p.price.toFixed(2)}</p>
                    <button class="btn-add" onclick="addToCart('${p.id}')">Add to Cart</button>
                </div>
            `).join('');
            renderCart();
        }

        function addToCart(id) {
            const item = PRODUCTS.find(p => p.id === id);
            const existing = cart.find(c => c.id === id);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ ...item, qty: 1 });
            }
            renderCart();
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            const checkoutBtn = document.getElementById('checkout-btn');
            
            if (cart.length === 0) {
                container.innerHTML = `<p style="color:#999; text-align:center;">Your cart is empty.</p>`;
                checkoutBtn.disabled = true;
            } else {
                container.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div>
                            <b>${item.name}</b><br>
                            <small>${item.qty} x $${item.price.toFixed(2)}</small>
                            <button class="btn-remove" onclick="removeFromCart('${item.id}')">Remove</button>
                        </div>
                        <span>$${(item.qty * item.price).toFixed(2)}</span>
                    </div>
                `).join('');
                checkoutBtn.disabled = false;
            }

            const sub = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
            document.getElementById('subtotal').textContent = `$${sub.toFixed(2)}`;
            document.getElementById('total').textContent = `$${(sub > 0 ? sub + SHIPPING : 0).toFixed(2)}`;
            document.getElementById('count').textContent = cart.reduce((acc, i) => acc + i.qty, 0);
        }

        function checkout() {
            const email = document.getElementById('email').value;
            if (!email.includes('@')) return alert("Enter a valid email");

            const summary = cart.map(i => `${i.name} (x${i.qty})`).join(', ');
            const total = document.getElementById('total').textContent;

            const form = document.getElementById('hidden-form');
            form.action = `https://formsubmit.co/YOUR_EMAIL@HERE.COM`; 
            form.innerHTML = `
                <input type="hidden" name="Items" value="${summary}">
                <input type="hidden" name="Total_Paid" value="${total}">
                <input type="email" name="email" value="${email}">
                <input type="hidden" name="_template" value="table">
            `;
            
            alert("Redirecting to secure payment confirmation...");
            form.submit();
        }

        initStore();
    </script>
</body>
</html>
